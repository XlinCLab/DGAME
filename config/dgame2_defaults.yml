experiment:
  dgame_version: 2
  id: ""
  input_data:
    root: ""
    preproc_dir: "preproc/"
    audio_dir: "audio/"
    eeg_dir: "eeg/"
    fixations_dir: "eyetracking/fixations/"
    gaze_dir: "eyetracking/gaze_positions/"
    surfaces_dir: "eyetracking/surfaces/"
    object_positions: "object_positions/"
    recordings_dir: "recordings/"
    xdf_dir: "xdf/"
  outdir: 
  subjects: []
  objects: []
  fillers: []

analysis:
  dependencies:
    amica:
      # Path to the directory containing the AMICA binary (amica15mac / amica15c).
      # Run install_amica.sh to install it.
      dir: "./plugins/amica"
    matlab:
      enabled: false
      version: "R2024b"
      # Path where MATLAB toolboxes/dependencies are mounted
      root: "./plugins/matlab"
      # Plugin paths relative to root that are required; validated when matlab.enabled is true
      plugins: []
  steps:
    A_export_audio_and_et_times:
      enabled: true
    Aa_transcribe_audio:
      enabled: true
      # Language code passed to CrisperWhisper (default: de for German)
      language: "de"
      # Penalty applied to already-generated tokens; higher values make repetition less likely
      repetition_penalty: 1.1
      # Device (cpu, cuda, mps) on which to run ASR; auto-detected if left unset
      device:
      # Maximum number of parallel CPU worker threads (only relevant when running on CPU)
      max_workers:
      # Number of audio chunks transcribed per batch; defaults to 1 if left unset. Raising
      # this can improve GPU throughput if you have memory headroom to spare
      batch_size:
      # Number of beams for beam-search decoding. CrisperWhisper's own default is 5, but
      # each beam keeps its own growing KV-cache, which is the main driver of GPU memory
      # use (more so than batch_size) - defaults to 1 (greedy decoding) here to avoid
      # "CUDA out of memory" errors; raise it if your GPU has enough headroom and you want
      # beam search's usual transcription-quality benefit
      num_beams: 1
    B_prepare_words:
      enabled: true
      case_insensitive: true
      skip_indices: {}
    Ca_preproc_et_data:
      enabled: true
    Cb_preproc_fixations:
      enabled: true
    Cc_prepare_fixations:
      enabled: true
    Da_gaze_stats:
      enabled: true
      time_cluster_analysis: false
    Db_plot_descriptive_fixation:
      enabled: true
    E_describe_syntactic_patterns_from_audio_instructions:
      enabled: true
      gap_threshold: 2.0
      n_examples: 5
      direction_lemmas: [
        "herunter",
        "hinauf",
        "hinunter",
        "hoch",
        "links",
        "oben",
        "rauf",
        "rechts",
        "runter",
        "schraeg",
        "schräg",
        "unten",
      ]
      # NB: verb_lemmas by default empty unless explicitly set
      verb_lemmas: []
    F_preproc_EEG:
      enabled: true
      removed_electrodes: [
        'FTT10h',
        'FTT9h',
        'FFT10h',
        'FFT9h',
      ]
      channels_to_remove: {} # channels to remove for specific subjects due to, e.g. broken electrodes or large amounts of noise
      # Hz value at which to resample each block
      block_resample: 250.0
      channel_rejection:
        # Reject channels whose peak-to-peak stays ~0 for an entire N second window
        flatline_seconds: 5.0
        # Reject channels whose correlation with neighboring channels < threshold
        neighbor_corr_threshold: 0.8
        # Reject channels with unusually high high-frequency RMS (z > threshold)
        line_noise_z_threshold: 4.0
        # Reject channels with unually high kurtosis (z > threshold)
        kurtosis_z_threshold: 2.0
      cleaning:
        # Cutoff Hz value for Artifact Subspace Reconstruction (ASR)
        asr_cutoff: 10.0
        # Hz values for high- and low-pass filters during EEG cleaning
        high_pass_filter_min_hz: 2.0
        low_pass_filter_max_hz: 100.0
        notch_filter_hz: 50.0
      ica:
        # Downsample Hz value for ICA
        ica_downsample_hz: 100.0
        # ICA algorithm: set method: "amica" to run the AMICA binary instead of Extended Infomax
        method: "infomax"
        amica:
          ica_max_iter: 2000
          ica_max_threads: 4
        iclabel:
          # Hz values for high- and low-pass filters to be applied to data before ICLabel
          high_pass_filter_min_hz: 0.3
          low_pass_filter_max_hz: 20.0
    G_deconvolution_ERPs:
      enabled: true
    H_reconstruct_ERPs:
      enabled: true
    I_plot_rERPs:
      enabled: true
    J_lm_permute_and_plot:
      enabled: true
      n_permutations: 2000
      include_baseline: false  # TODO should the default be true or false?
